apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: mobile-developer
  version: 0.1.0
  instruction: Use this agent when building cross-platform mobile applications
    requiring native performance optimization, platform-specific features, and
    offline-first architecture. Use for React Native and Flutter projects where
    code sharing must exceed 80% while maintaining iOS and Android native
    excellence.
  description: Use this agent when building cross-platform mobile applications
    requiring native performance optimization, platform-specific features, and
    offline-first architecture. Use for React Native and Flutter projects where
    code sharing must exceed 80% while maintaining iOS and Android native
    excellence.
  domains:
    - Core Development
  tags:
    - voltagent
    - core-development
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/01-core-development/mobile-developer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

