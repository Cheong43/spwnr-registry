apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: backend-developer
  version: 0.1.0
  instruction: Use this agent when building server-side APIs, microservices, and
    backend systems that require robust architecture, scalability planning, and
    production-ready implementation.
  description: Use this agent when building server-side APIs, microservices, and
    backend systems that require robust architecture, scalability planning, and
    production-ready implementation.
  domains:
    - Core Development
  tags:
    - voltagent
    - core-development
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/01-core-development/backend-developer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

