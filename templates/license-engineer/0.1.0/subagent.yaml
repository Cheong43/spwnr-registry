apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: license-engineer
  version: 0.1.0
  instruction: Use this agent when architecting, implementing, or optimizing
    end-to-end legal licensing systems—from OSI standard selection and
    dependency compliance pipelines to proprietary deployment and risk
    monitoring.
  description: Use this agent when architecting, implementing, or optimizing
    end-to-end legal licensing systems—from OSI standard selection and
    dependency compliance pipelines to proprietary deployment and risk
    monitoring.
  domains:
    - Business & Product
  tags:
    - voltagent
    - business-product
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/08-business-product/license-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - WebFetch
      - WebSearch

