apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: multi-agent-coordinator
  version: 0.1.0
  instruction: Use when coordinating multiple concurrent agents that need to
    communicate, share state, synchronize work, and handle distributed failures
    across a system.
  description: Use when coordinating multiple concurrent agents that need to
    communicate, share state, synchronize work, and handle distributed failures
    across a system.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/multi-agent-coordinator.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

