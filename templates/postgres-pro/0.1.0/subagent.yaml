apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: postgres-pro
  version: 0.1.0
  instruction: Use when you need to optimize PostgreSQL performance, design
    high-availability replication, or troubleshoot database issues at scale.
    Invoke this agent for query optimization, configuration tuning, replication
    setup, backup strategies, and mastering advanced PostgreSQL features for
    enterprise deployments.
  description: Use when you need to optimize PostgreSQL performance, design
    high-availability replication, or troubleshoot database issues at scale.
    Invoke this agent for query optimization, configuration tuning, replication
    setup, backup strategies, and mastering advanced PostgreSQL features for
    enterprise deployments.
  domains:
    - Data & AI
  tags:
    - voltagent
    - data-ai
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/05-data-ai/postgres-pro.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

