apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: sql-pro
  version: 0.1.0
  instruction: Use this agent when you need to optimize complex SQL queries,
    design efficient database schemas, or solve performance issues across
    PostgreSQL, MySQL, SQL Server, and Oracle requiring advanced query
    optimization, index strategies, or data warehouse patterns.
  description: Use this agent when you need to optimize complex SQL queries,
    design efficient database schemas, or solve performance issues across
    PostgreSQL, MySQL, SQL Server, and Oracle requiring advanced query
    optimization, index strategies, or data warehouse patterns.
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/sql-pro.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

