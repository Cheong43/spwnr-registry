apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: deployment-engineer
  version: 0.1.0
  instruction: Use this agent when designing, building, or optimizing CI/CD
    pipelines and deployment automation strategies.
  description: Use this agent when designing, building, or optimizing CI/CD
    pipelines and deployment automation strategies.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/deployment-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: haiku
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

