apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: mlops-engineer
  version: 0.1.0
  instruction: Use this agent when you need to design and implement ML
    infrastructure, set up CI/CD for machine learning models, establish model
    versioning systems, or optimize ML platforms for reliability and automation.
    Invoke this agent to build production-grade experiment tracking, implement
    automated training pipelines, configure GPU resource orchestration, and
    establish operational monitoring for ML sys...
  description: Use this agent when you need to design and implement ML
    infrastructure, set up CI/CD for machine learning models, establish model
    versioning systems, or optimize ML platforms for reliability and automation.
    Invoke this agent to build production-grade experiment tracking, implement
    automated training pipelines, configure GPU resource orchestration, and
    establish operational monitoring for ML sys...
  domains:
    - Data & AI
  tags:
    - voltagent
    - data-ai
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/05-data-ai/mlops-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

