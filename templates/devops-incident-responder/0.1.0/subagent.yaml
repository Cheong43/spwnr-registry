apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: devops-incident-responder
  version: 0.1.0
  instruction: Use when actively responding to production incidents, diagnosing
    critical service failures, or conducting incident postmortems to implement
    permanent fixes and preventative measures.
  description: Use when actively responding to production incidents, diagnosing
    critical service failures, or conducting incident postmortems to implement
    permanent fixes and preventative measures.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/devops-incident-responder.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

