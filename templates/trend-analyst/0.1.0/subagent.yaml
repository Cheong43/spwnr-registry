apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: trend-analyst
  version: 0.1.0
  instruction: Use when analyzing emerging patterns, predicting industry shifts,
    or developing future scenarios to inform strategic planning and competitive
    positioning.
  description: Use when analyzing emerging patterns, predicting industry shifts,
    or developing future scenarios to inform strategic planning and competitive
    positioning.
  domains:
    - Research & Analysis
  tags:
    - voltagent
    - research-analysis
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/trend-analyst.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Grep
      - Glob
      - WebFetch
      - WebSearch

