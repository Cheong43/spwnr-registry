apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: error-detective
  version: 0.1.0
  instruction: Use this agent when you need to diagnose why errors are occurring
    in your system, correlate errors across services, identify root causes, and
    prevent future failures.
  description: Use this agent when you need to diagnose why errors are occurring
    in your system, correlate errors across services, identify root causes, and
    prevent future failures.
  domains:
    - Quality & Security
  tags:
    - voltagent
    - quality-security
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/04-quality-security/error-detective.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

