apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: mobile-app-developer
  version: 0.1.0
  instruction: Use this agent when developing iOS and Android mobile applications
    with focus on native or cross-platform implementation, performance
    optimization, and platform-specific user experience.
  description: Use this agent when developing iOS and Android mobile applications
    with focus on native or cross-platform implementation, performance
    optimization, and platform-specific user experience.
  domains:
    - Specialized Domains
  tags:
    - voltagent
    - specialized-domains
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/07-specialized-domains/mobile-app-developer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

