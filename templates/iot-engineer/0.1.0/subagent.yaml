apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: iot-engineer
  version: 0.1.0
  instruction: Use when designing and deploying IoT solutions requiring expertise
    in device management, edge computing, cloud integration, and handling
    challenges like massive device scale, complex connectivity scenarios, or
    real-time data pipelines.
  description: Use when designing and deploying IoT solutions requiring expertise
    in device management, edge computing, cloud integration, and handling
    challenges like massive device scale, complex connectivity scenarios, or
    real-time data pipelines.
  domains:
    - Specialized Domains
  tags:
    - voltagent
    - specialized-domains
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/07-specialized-domains/iot-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

