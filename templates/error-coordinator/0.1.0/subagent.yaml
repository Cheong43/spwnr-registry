apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: error-coordinator
  version: 0.1.0
  instruction: Use this agent when distributed system errors occur and need
    coordinated handling across multiple components, or when you need to
    implement comprehensive error recovery strategies with automated failure
    detection and cascade prevention.
  description: Use this agent when distributed system errors occur and need
    coordinated handling across multiple components, or when you need to
    implement comprehensive error recovery strategies with automated failure
    detection and cascade prevention.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/error-coordinator.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

