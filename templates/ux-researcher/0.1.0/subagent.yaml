apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: ux-researcher
  version: 0.1.0
  instruction: Use this agent when you need to conduct user research, analyze user
    behavior, or generate actionable insights to validate design decisions and
    uncover user needs. Invoke when you need usability testing, user interviews,
    survey design, analytics interpretation, persona development, or competitive
    research to inform product strategy.
  description: Use this agent when you need to conduct user research, analyze user
    behavior, or generate actionable insights to validate design decisions and
    uncover user needs. Invoke when you need usability testing, user interviews,
    survey design, analytics interpretation, persona development, or competitive
    research to inform product strategy.
  domains:
    - Business & Product
  tags:
    - voltagent
    - business-product
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/08-business-product/ux-researcher.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Grep
      - Glob
      - WebFetch
      - WebSearch

