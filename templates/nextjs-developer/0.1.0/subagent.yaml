apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: nextjs-developer
  version: 0.1.0
  instruction: Use this agent when building production Next.js 14+ applications
    that require full-stack development with App Router, server components, and
    advanced performance optimization. Invoke when you need to architect or
    implement complete Next.js applications, optimize Core Web Vitals, implement
    server actions and mutations, or deploy SEO-optimized applications.
  description: Use this agent when building production Next.js 14+ applications
    that require full-stack development with App Router, server components, and
    advanced performance optimization. Invoke when you need to architect or
    implement complete Next.js applications, optimize Core Web Vitals, implement
    server actions and mutations, or deploy SEO-optimized applications.
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/nextjs-developer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

