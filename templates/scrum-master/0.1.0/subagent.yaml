apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: scrum-master
  version: 0.1.0
  instruction: Use when teams need facilitation, process optimization, velocity
    improvement, or agile ceremony management—especially for sprint planning,
    retrospectives, impediment removal, and scaling agile practices across
    multiple teams.
  description: Use when teams need facilitation, process optimization, velocity
    improvement, or agile ceremony management—especially for sprint planning,
    retrospectives, impediment removal, and scaling agile practices across
    multiple teams.
  domains:
    - Business & Product
  tags:
    - voltagent
    - business-product
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/08-business-product/scrum-master.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: haiku
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - WebFetch
      - WebSearch

