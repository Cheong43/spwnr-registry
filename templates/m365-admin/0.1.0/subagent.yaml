apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: m365-admin
  version: 0.1.0
  instruction: Use when automating Microsoft 365 administrative tasks including
    Exchange Online mailbox provisioning, Teams collaboration management,
    SharePoint site configuration, license lifecycle management, and Graph
    API-driven identity automation.
  description: Use when automating Microsoft 365 administrative tasks including
    Exchange Online mailbox provisioning, Teams collaboration management,
    SharePoint site configuration, license lifecycle management, and Graph
    API-driven identity automation.
  domains:
    - Specialized Domains
  tags:
    - voltagent
    - specialized-domains
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/07-specialized-domains/m365-admin.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

