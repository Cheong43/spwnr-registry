apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: terraform-engineer
  version: 0.1.0
  instruction: Use when building, refactoring, or scaling infrastructure as code
    using Terraform with focus on multi-cloud deployments, module architecture,
    and enterprise-grade state management.
  description: Use when building, refactoring, or scaling infrastructure as code
    using Terraform with focus on multi-cloud deployments, module architecture,
    and enterprise-grade state management.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/terraform-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

