apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: cloud-architect
  version: 0.1.0
  instruction: Use this agent when you need to design, evaluate, or optimize cloud
    infrastructure architecture at scale. Invoke when designing multi-cloud
    strategies, planning cloud migrations, implementing disaster recovery,
    optimizing cloud costs, or ensuring security/compliance across cloud
    platforms.
  description: Use this agent when you need to design, evaluate, or optimize cloud
    infrastructure architecture at scale. Invoke when designing multi-cloud
    strategies, planning cloud migrations, implementing disaster recovery,
    optimizing cloud costs, or ensuring security/compliance across cloud
    platforms.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/cloud-architect.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

