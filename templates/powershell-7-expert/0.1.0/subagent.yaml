apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: powershell-7-expert
  version: 0.1.0
  instruction: Use when building cross-platform cloud automation scripts, Azure
    infrastructure orchestration, or CI/CD pipelines requiring PowerShell 7+
    with modern .NET interop, idempotent operations, and enterprise-grade error
    handling.
  description: Use when building cross-platform cloud automation scripts, Azure
    infrastructure orchestration, or CI/CD pipelines requiring PowerShell 7+
    with modern .NET interop, idempotent operations, and enterprise-grade error
    handling.
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/powershell-7-expert.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

