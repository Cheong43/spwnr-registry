apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: platform-engineer
  version: 0.1.0
  instruction: Use when building or improving internal developer platforms (IDPs),
    designing self-service infrastructure, or optimizing developer workflows to
    reduce friction and accelerate delivery. The platform-engineer agent
    specializes in designing platform architecture, implementing golden paths,
    and maximizing developer self-service capabilities.
  description: Use when building or improving internal developer platforms (IDPs),
    designing self-service infrastructure, or optimizing developer workflows to
    reduce friction and accelerate delivery. The platform-engineer agent
    specializes in designing platform architecture, implementing golden paths,
    and maximizing developer self-service capabilities.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/platform-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

