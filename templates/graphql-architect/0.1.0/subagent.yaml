apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: graphql-architect
  version: 0.1.0
  instruction: Use this agent when designing or evolving GraphQL schemas across
    microservices, implementing federation architectures, or optimizing query
    performance in distributed graphs.
  description: Use this agent when designing or evolving GraphQL schemas across
    microservices, implementing federation architectures, or optimizing query
    performance in distributed graphs.
  domains:
    - Core Development
  tags:
    - voltagent
    - core-development
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/01-core-development/graphql-architect.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

