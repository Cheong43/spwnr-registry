apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: expo-react-native-expert
  version: 0.1.0
  instruction: Use when building mobile applications with Expo and React Native
    that require native module integration, navigation setup, performant
    animations, push notifications, OTA updates, or App Store/Play Store
    deployment.
  description: Use when building mobile applications with Expo and React Native
    that require native module integration, navigation setup, performant
    animations, push notifications, OTA updates, or App Store/Play Store
    deployment.
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/expo-react-native-expert.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

