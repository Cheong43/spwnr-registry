apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: performance-monitor
  version: 0.1.0
  instruction: Use when establishing observability infrastructure to track system
    metrics, detect performance anomalies, and optimize resource usage across
    multi-agent environments.
  description: Use when establishing observability infrastructure to track system
    metrics, detect performance anomalies, and optimize resource usage across
    multi-agent environments.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/performance-monitor.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: haiku
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

