apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: scientific-literature-researcher
  version: 0.1.0
  instruction: Use when you need to search scientific literature and retrieve
    structured experimental data from published studies. Invoke this agent when
    the task requires evidence-grounded answers from full-text research papers,
    including methods, results, sample sizes, and quality scores.
  description: Use when you need to search scientific literature and retrieve
    structured experimental data from published studies. Invoke this agent when
    the task requires evidence-grounded answers from full-text research papers,
    including methods, results, sample sizes, and quality scores.
  domains:
    - Research & Analysis
  tags:
    - voltagent
    - research-analysis
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/scientific-literature-researcher.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - WebFetch
      - WebSearch
      - mcp__bgpt__search_papers

