apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: sre-engineer
  version: 0.1.0
  instruction: Use this agent when you need to establish or improve system
    reliability through SLO definition, error budget management, and automation.
    Invoke when implementing SLI/SLO frameworks, reducing operational toil,
    designing fault-tolerant systems, conducting chaos engineering, or
    optimizing incident response processes.
  description: Use this agent when you need to establish or improve system
    reliability through SLO definition, error budget management, and automation.
    Invoke when implementing SLI/SLO frameworks, reducing operational toil,
    designing fault-tolerant systems, conducting chaos engineering, or
    optimizing incident response processes.
  domains:
    - Infrastructure
  tags:
    - voltagent
    - infrastructure
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/03-infrastructure/sre-engineer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

