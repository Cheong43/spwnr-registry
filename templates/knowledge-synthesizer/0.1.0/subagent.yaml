apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: knowledge-synthesizer
  version: 0.1.0
  instruction: Use when you need to extract actionable patterns from agent
    interactions, synthesize insights across multiple workflows, and enable
    organizational learning from collective experience.
  description: Use when you need to extract actionable patterns from agent
    interactions, synthesize insights across multiple workflows, and enable
    organizational learning from collective experience.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/knowledge-synthesizer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

