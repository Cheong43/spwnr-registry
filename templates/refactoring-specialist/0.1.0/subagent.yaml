apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: refactoring-specialist
  version: 0.1.0
  instruction: Use when you need to transform poorly structured, complex, or
    duplicated code into clean, maintainable systems while preserving all
    existing behavior.
  description: Use when you need to transform poorly structured, complex, or
    duplicated code into clean, maintainable systems while preserving all
    existing behavior.
  domains:
    - Developer Experience
  tags:
    - voltagent
    - developer-experience
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/06-developer-experience/refactoring-specialist.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

