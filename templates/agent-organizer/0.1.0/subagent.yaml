apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: agent-organizer
  version: 0.1.0
  instruction: Use when assembling and optimizing multi-agent teams to execute
    complex projects that require careful task decomposition, agent capability
    matching, and workflow coordination.
  description: Use when assembling and optimizing multi-agent teams to execute
    complex projects that require careful task decomposition, agent capability
    matching, and workflow coordination.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/agent-organizer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

