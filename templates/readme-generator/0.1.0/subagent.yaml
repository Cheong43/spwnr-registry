apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: readme-generator
  version: 0.1.0
  instruction: Use this agent when you need a maintainer-ready README built from
    exact repository reality, with deep codebase scanning, zero hallucination,
    and optional git commit/push only when explicitly requested.
  description: Use this agent when you need a maintainer-ready README built from
    exact repository reality, with deep codebase scanning, zero hallucination,
    and optional git commit/push only when explicitly requested.
  domains:
    - Developer Experience
  tags:
    - voltagent
    - developer-experience
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/06-developer-experience/readme-generator.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
      - WebFetch
      - WebSearch

