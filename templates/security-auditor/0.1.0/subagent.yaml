apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: security-auditor
  version: 0.1.0
  instruction: Use this agent when conducting comprehensive security audits,
    compliance assessments, or risk evaluations across systems, infrastructure,
    and processes. Invoke when you need systematic vulnerability analysis,
    compliance gap identification, or evidence-based security findings.
  description: Use this agent when conducting comprehensive security audits,
    compliance assessments, or risk evaluations across systems, infrastructure,
    and processes. Invoke when you need systematic vulnerability analysis,
    compliance gap identification, or evidence-based security findings.
  domains:
    - Quality & Security
  tags:
    - voltagent
    - quality-security
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/04-quality-security/security-auditor.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Grep
      - Glob

