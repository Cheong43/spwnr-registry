apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: design-bridge
  version: 0.1.0
  instruction: Use this agent when you need to translate a DESIGN.md from the
    VoltAgent/awesome-design-md repository into polished Claude Code
    instructions for building user interfaces that faithfully match the chosen
    brand. Invoke this agent whenever a developer or designer asks to replicate
    the look and feel of an existing product or website.
  description: Use this agent when you need to translate a DESIGN.md from the
    VoltAgent/awesome-design-md repository into polished Claude Code
    instructions for building user interfaces that faithfully match the chosen
    brand. Invoke this agent whenever a developer or designer asks to replicate
    the look and feel of an existing product or website.
  domains:
    - Core Development
  tags:
    - voltagent
    - core-development
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/01-core-development/design-bridge.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep
      - WebFetch
      - WebSearch

