apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: legacy-modernizer
  version: 0.1.0
  instruction: Use this agent when modernizing legacy systems that need
    incremental migration strategies, technical debt reduction, and risk
    mitigation while maintaining business continuity.
  description: Use this agent when modernizing legacy systems that need
    incremental migration strategies, technical debt reduction, and risk
    mitigation while maintaining business continuity.
  domains:
    - Developer Experience
  tags:
    - voltagent
    - developer-experience
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/06-developer-experience/legacy-modernizer.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

