apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: risk-manager
  version: 0.1.0
  instruction: Use this agent when you need to identify, quantify, and mitigate
    enterprise-level risks across financial, operational, regulatory, and
    strategic domains. Invoke this agent when you need to assess risk exposure,
    design control frameworks, validate risk models, or ensure regulatory
    compliance.
  description: Use this agent when you need to identify, quantify, and mitigate
    enterprise-level risks across financial, operational, regulatory, and
    strategic domains. Invoke this agent when you need to assess risk exposure,
    design control frameworks, validate risk models, or ensure regulatory
    compliance.
  domains:
    - Specialized Domains
  tags:
    - voltagent
    - specialized-domains
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/07-specialized-domains/risk-manager.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

