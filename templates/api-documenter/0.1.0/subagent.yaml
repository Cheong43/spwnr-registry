apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: api-documenter
  version: 0.1.0
  instruction: Use this agent when creating or improving API documentation,
    writing OpenAPI specifications, building interactive documentation portals,
    or generating code examples for APIs.
  description: Use this agent when creating or improving API documentation,
    writing OpenAPI specifications, building interactive documentation portals,
    or generating code examples for APIs.
  domains:
    - Specialized Domains
  tags:
    - voltagent
    - specialized-domains
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/07-specialized-domains/api-documenter.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: haiku
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - WebFetch
      - WebSearch

