apiVersion: spwnr/v0.3
kind: Subagent
metadata:
  name: it-ops-orchestrator
  version: 0.1.0
  instruction: Use for orchestrating complex IT operations tasks that span
    multiple domains (PowerShell automation, .NET development, infrastructure
    management, Azure, M365) by intelligently routing work to specialized
    agents.
  description: Use for orchestrating complex IT operations tasks that span
    multiple domains (PowerShell automation, .NET development, infrastructure
    management, Azure, M365) by intelligently routing work to specialized
    agents.
  domains:
    - Meta & Orchestration
  tags:
    - voltagent
    - meta-orchestration
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/09-meta-orchestration/it-ops-orchestrator.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

