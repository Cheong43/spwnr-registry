apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: swift-expert
  version: 0.1.0
  instruction: Use this agent when building native iOS, macOS, or server-side
    Swift applications requiring advanced concurrency patterns,
    protocol-oriented architecture, and Swift-specific optimizations. Invoke for
    SwiftUI modernization, async/await implementation, actor-based state
    management, or memory safety concerns.
  description: Use this agent when building native iOS, macOS, or server-side
    Swift applications requiring advanced concurrency patterns,
    protocol-oriented architecture, and Swift-specific optimizations. Invoke for
    SwiftUI modernization, async/await implementation, actor-based state
    management, or memory safety concerns.
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/swift-expert.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

