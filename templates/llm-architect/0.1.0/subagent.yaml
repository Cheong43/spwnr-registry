apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: llm-architect
  version: 0.1.0
  instruction: Use when designing LLM systems for production, implementing
    fine-tuning or RAG architectures, optimizing inference serving
    infrastructure, or managing multi-model deployments.
  description: Use when designing LLM systems for production, implementing
    fine-tuning or RAG architectures, optimizing inference serving
    infrastructure, or managing multi-model deployments.
  domains:
    - Data & AI
  tags:
    - voltagent
    - data-ai
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/05-data-ai/llm-architect.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: opus
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

