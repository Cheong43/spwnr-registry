apiVersion: spwnr/v1
kind: Subagent
metadata:
  name: rails-expert
  version: 0.1.0
  instruction: "Use when building or modernizing Rails applications requiring API
    development, Hotwire reactivity, real-time features, background job
    processing, deployment automation, or Rails-idiomatic patterns for maximum
    productivity. Version-aware: adapts to Rails 7.x and 8.x projects."
  description: "Use when building or modernizing Rails applications requiring API
    development, Hotwire reactivity, real-time features, background job
    processing, deployment automation, or Rails-idiomatic patterns for maximum
    productivity. Version-aware: adapts to Rails 7.x and 8.x projects."
  domains:
    - Language Specialists
  tags:
    - voltagent
    - language-specialists
  authors:
    - name: VoltAgent
      github: VoltAgent
      url: https://github.com/VoltAgent
  license: MIT
  homepage: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/02-language-specialists/rails-expert.md
  repository: https://github.com/VoltAgent/awesome-claude-code-subagents
spec:
  agent:
    path: ./agent.md
  injection:
    hosts:
      claude_code:
        static:
          enabled: true
          defaultScope: project
        session:
          enabled: true
          defaultScope: user
  compatibility:
    hosts:
      - claude_code
    mode: single_host
    badges:
      - claude_code
  artifacts:
    - guidance
  modelBinding:
    mode: injectable
    defaultProvider: anthropic
    defaultModel: sonnet
    allowOverride: true
    billing:
      mode: passthrough
  tools:
    allow:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

